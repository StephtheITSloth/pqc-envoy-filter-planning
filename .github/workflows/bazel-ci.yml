name: Bazel CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  bazel-build-test:
    name: Bazel Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bazelisk
        run: |
          mkdir -p "${HOME}/bin"
          curl -L "https://github.com/bazelbuild/bazelisk/releases/download/v1.19.0/bazelisk-linux-amd64" -o "${HOME}/bin/bazel"
          chmod +x "${HOME}/bin/bazel"
          echo "${HOME}/bin" >> "${GITHUB_PATH}"

      - name: Cache Bazel output
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk-cache
          key: ${{ runner.os }}-bazel-${{ hashFiles('WORKSPACE', '.bazelrc', '.bazelversion') }}
          restore-keys: ${{ runner.os }}-bazel-

      - name: Verify Bazel version
        run: bazel version

      - name: Fetch external dependencies
        run: bazel fetch //...

      - name: Build PQC filter library
        run: bazel build //src/filters/pqc:pqc_filter_lib

      - name: Build all targets
        run: bazel build //...

      - name: Run all tests
        run: bazel test //... --test_output=errors
