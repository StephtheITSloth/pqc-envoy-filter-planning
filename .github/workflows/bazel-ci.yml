name: Bazel CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  bazel-build-test:
    name: Bazel Build & Test
    runs-on: ubuntu-latest
    container:
      image: envoyproxy/envoy-dev:4f5386abdc9a52340a892e56ca8a50a6e196c98f

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('WORKSPACE', 'MODULE.bazel', '.bazelrc') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build PQC filter library
        run: bazel build //src/filters/pqc:pqc_filter_lib --config=fastbuild

      - name: Run PQC filter unit tests
        run: bazel test //test/filters/pqc:pqc_filter_test --test_output=all

      - name: Build all targets
        run: bazel build //... --config=fastbuild

      - name: Run all tests
        run: bazel test //... --test_output=errors
