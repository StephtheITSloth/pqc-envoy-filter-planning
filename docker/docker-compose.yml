# Docker Compose for PQC Envoy Filter Development

version: '3.8'

services:
  # Development container with Bazel and build tools
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: pqc-envoy-dev
    volumes:
      - ..:/workspace
      - bazel-cache:/root/.cache/bazel
    working_dir: /workspace
    command: /bin/bash
    stdin_open: true
    tty: true

  # Envoy proxy with PQC filter (for testing)
  envoy:
    build:
      context: ..
      dockerfile: docker/Dockerfile.envoy
    container_name: pqc-envoy
    ports:
      - "8443:8443"  # HTTPS with PQC
      - "9901:9901"  # Admin interface
    volumes:
      - ../config:/etc/envoy
    command: envoy -c /etc/envoy/bootstrap.yaml
    depends_on:
      - backend

  # Mock backend service
  backend:
    image: hashicorp/http-echo:latest
    container_name: pqc-backend
    command: ["-text", "Hello from PQC-protected backend!"]
    ports:
      - "5678:5678"

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: pqc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: pqc-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  bazel-cache:
  prometheus-data:
  grafana-data:

