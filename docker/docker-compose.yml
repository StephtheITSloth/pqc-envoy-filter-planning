services:
  pqc-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: pqc-envoy-dev:local
    working_dir: /workspace
    command: ["bash"]
    stdin_open: true
    tty: true
    volumes:
      - ..:/workspace

  watsonx-policy-service:
    build:
      context: ..
      dockerfile: services/watsonx_policy_service/Dockerfile
    image: watsonx-policy-service:local
    ports:
      - "8080:8080"
    environment:
      POLICY_DECISION_MODE: ${POLICY_DECISION_MODE:-mock}
      POLICY_FAIL_OPEN: ${POLICY_FAIL_OPEN:-true}
      POLICY_SERVICE_HOST: 0.0.0.0
      POLICY_SERVICE_PORT: 8080
      MOCK_REQUIRE_PQC_SERVICES: ${MOCK_REQUIRE_PQC_SERVICES:-payments.internal}
      MOCK_ALLOW_FALLBACK_SERVICES: ${MOCK_ALLOW_FALLBACK_SERVICES:-watsonx.ibm.com}
      MOCK_REQUIRE_PQC_PATH_PREFIXES: ${MOCK_REQUIRE_PQC_PATH_PREFIXES:-/agent/secure,/secure}
      WATSONX_URL: ${WATSONX_URL:-}
      WATSONX_PROJECT_ID: ${WATSONX_PROJECT_ID:-}
      WATSONX_MODEL_ID: ${WATSONX_MODEL_ID:-meta-llama/llama-3-8b-instruct}
      WATSONX_API_VERSION: ${WATSONX_API_VERSION:-2024-10-08}
      WATSONX_TIMEOUT_SECONDS: ${WATSONX_TIMEOUT_SECONDS:-10}
      IBM_CLOUD_APIKEY: ${IBM_CLOUD_APIKEY:-}
